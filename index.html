<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple-timer</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>

<body>
  <div class="content-space">
    <main class="timer-card">
      <p id="timer-display" class="timer-display">00:00:00</p>

      <div class="controls">
        <div class="controls">
          <button class="control-btn" id="toggle" aria-label="Start">
            <svg width="32" height="32" viewBox="0 0 24 24">
              <path d="M8 5v14l11-7z" fill="#1466E0" />
            </svg>
          </button>

          <button class="control-btn stop" id="stop" aria-label="Stop">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="18" height="18" fill="#D9D9D9" />
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>
</body>

</html>
